// imac-2019 — i5-9600K / Radeon Pro 580X 8 GB / Sequoia (modern reference)
// Max quality. This machine separates CPU-bound from GPU-bound effects across
// the GPU axis — it should never be the bottleneck on a stock Q3 load.
seta r_mode "-1"
seta r_customwidth "1920"
seta r_customheight "1080"
seta r_fullscreen "1"
seta r_picmip "0"
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"
seta r_subdivisions "4"
seta r_lodbias "0"
seta r_dynamiclight "1"
seta cg_shadows "1"
seta r_ext_compressed_textures "0"    // plenty of VRAM
seta r_ext_texture_filter_anisotropic "1"
seta r_ext_max_anisotropy "16"
seta com_maxfps "0"
seta cg_drawfps "1"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
seta watch_host "auto"
seta watch_port "27999"
