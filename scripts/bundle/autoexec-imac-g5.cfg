// imac-g5 — iMac G5 (PowerPC 970 @ 2.0 GHz) / Radeon 9600 128 MB / Leopard 10.5.8
// Runs the fat binary's ppc7400 slice (no dedicated 970 slice). The strongest
// PPC box in the fleet. Bench-CONFIRMED at NATIVE 1440x900, vsync OFF (measured
// with r_swapInterval 0), demo four, fully maxed (picmip 0 + aniso 8 + trilinear
// + shadows + flares + dlights): 60.0 fps. That is the true GPU ceiling here,
// NOT a vsync cap — the G5 is genuinely ~60 fps GPU-bound at this quality, so
// there is no free headroom. But with no fps floor and effects>fps, we spend the
// frames we DO have on antialiasing (see r_ext_multisample below). (An earlier
// header claimed 128.9 fps @1600x1200 "maxed"; that predated aniso 8 + trilinear
// + flares + the 1440x900 move and never reproduced — corrected 2026-07-05.)
seta r_mode "-1"
seta r_customwidth "1440"             // native panel — true fullscreen/full-width
seta r_customheight "900"
seta r_fullscreen "1"
seta r_picmip "0"                     // full-res textures — 128 MB VRAM + headroom
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"
seta r_subdivisions "4"
seta r_lodbias "0"
seta r_dynamiclight "1"
seta r_flares "1"
seta r_fastsky "0"
seta cg_shadows "1"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "1"
seta r_ext_max_anisotropy "8"        // 8x aniso — proven free here
seta r_textureMode "GL_LINEAR_MIPMAP_LINEAR"  // trilinear — crisp mip transitions
// 2x FSAA (multisample AA) — the biggest remaining visual upgrade on the G5:
// smooths Q3's jagged geometry/weapon edges, its most dated look. Bench-CONFIRMED
// @1440x900 vsync-off: 60.0 -> 34.5 fps (2 clean samples 34.5/34.4). A ~43% cost
// the G5 can afford — no fps floor here and effects>fps, and it stays smooth.
// 4x FSAA was tried and REJECTED: 20.1 fps (3x hit, 149 ms worst frame) — too
// costly (recorded in docs/PROFILING.md). Driven via SDL_GL_MULTISAMPLE* at
// context creation (sdl_glimp.c); CVAR_LATCH so it's read once at GL init.
seta r_ext_multisample "2"
seta com_maxfps "0"
seta cg_drawfps "1"
seta cg_lagometer "0"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
// Leopard 10.5's mDNSResponder + the ppc7400 slice's getaddrinfo fallback
// resolve the companion's .local name to an IPv4 (DNSServiceGetAddrInfo is a
// 10.5-SDK symbol the 10.4u-built slice doesn't link).
seta watch_host "auto"
seta watch_port "27999"
