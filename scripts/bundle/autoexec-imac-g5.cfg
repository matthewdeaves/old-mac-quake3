// imac-g5 — iMac G5 (PowerPC 970 @ 2.0 GHz) / Radeon 9600 128 MB / Leopard 10.5.8
// Runs the fat binary's ppc7400 slice (no dedicated 970 slice). The strongest
// PPC box in the fleet. Bench PROVED huge headroom: 128.9 fps @ 1600x1200 at
// max quality (picmip 0 + aniso 8 + trilinear + effects). So ship its NATIVE
// 1440x900 maxed out — it sits well above 100 fps with everything on.
seta r_mode "-1"
seta r_customwidth "1440"             // native panel — true fullscreen/full-width
seta r_customheight "900"
seta r_fullscreen "1"
seta r_picmip "0"                     // full-res textures — 128 MB VRAM + headroom
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"
seta r_subdivisions "4"
seta r_lodbias "0"
seta r_dynamiclight "1"
seta r_flares "1"
seta r_fastsky "0"
seta cg_shadows "1"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "1"
seta r_ext_max_anisotropy "8"        // 8x aniso — proven free here
seta r_textureMode "GL_LINEAR_MIPMAP_LINEAR"  // trilinear — crisp mip transitions
seta com_maxfps "0"
seta cg_drawfps "1"
seta cg_lagometer "0"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
// Leopard 10.5's mDNSResponder + the ppc7400 slice's getaddrinfo fallback
// resolve the companion's .local name to an IPv4 (DNSServiceGetAddrInfo is a
// 10.5-SDK symbol the 10.4u-built slice doesn't link).
seta watch_host "auto"
seta watch_port "27999"
