// mini-g4 — G4 1.25 GHz / Radeon 9200 32 MB / Tiger 10.4.11 (fastest G4 CPU)
// Native panel 1680x1050 (NATIVE = true fullscreen/full-width + safe same-mode
// set). Fastest G4 CPU but only 32 MB VRAM, so picmip 1 (not 0) at this high
// res to avoid texture thrash. Real renderer on (lightmaps/shaders/dlights).
// NOTE: native-res fps not yet bench-validated on hardware — confirm on site.
seta r_mode "-1"
seta r_customwidth "1680"
seta r_customheight "1050"
seta r_fullscreen "1"
seta r_picmip "1"                    // 32 MB VRAM @ 1680x1050 — keep picmip 1
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"
seta r_subdivisions "8"
seta r_lodbias "0"
seta r_dynamiclight "1"
seta r_flares "1"
seta r_fastsky "0"
seta cg_shadows "1"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "1"
seta r_ext_max_anisotropy "2"        // light aniso (2x) at high res
seta com_maxfps "0"
seta cg_drawfps "1"
seta cg_lagometer "0"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
seta watch_host "auto"
seta watch_port "27999"
