// mini-g4 — G4 1.25 GHz / Radeon 9200 32 MB / Tiger 10.4.11 (fastest G4 CPU)
// Native panel 1680x1050 (NATIVE = true fullscreen/full-width + safe same-mode
// set). Auto-applied by hw.model PowerMac10,1 (common.c).
//
// BENCH-CONFIRMED on hardware 2026-07-05 (demo four @ native 1680x1050, vsync
// off): 27.5 fps, HARDWARE GL ("ATI Radeon 9200 OpenGL Engine" — NOT the old
// software-GL fallback; safebench's real-display fullscreen path gets hw accel).
// KEY FINDING: this is a DIFFERENT bottleneck from quicksilver. Despite a FASTER
// CPU (1.25 GHz vs 733) it's SLOWER than quicksilver's 41 fps => GPU-bound, and
// specifically FILL-RATE / overdraw bound, NOT bandwidth: 16-bit color/depth/tex
// and picmip 2 BOTH moved fps 0.0 (27.5->27.9, noise) — recorded negatives, do
// not re-chase. So quicksilver's "aniso is free" does NOT transfer here (that was
// a CPU-bound machine w/ fill headroom; this one has none). The only config lever
// that moved fps was r_dynamiclight 0 (+2.5, 27.5->30.0) but it costs the
// rocket/plasma glow and does NOT fix the ~138 ms periodic spikes (those are
// invariant across every config = bot-skin texture-upload stalls, a load cost) —
// a poor effects>fps trade, so we KEEP dynamic lights on. Config held at the
// looks-first values below; raising fps further needs a code-level win or a
// resolution drop (blocked: native-only for safe fullscreen). See PROFILING.md.
// 32 MB VRAM so picmip 1 (not 0) at this high res.
seta r_mode "-1"
seta r_customwidth "1680"
seta r_customheight "1050"
seta r_fullscreen "1"
seta r_picmip "1"                    // 32 MB VRAM @ 1680x1050 — keep picmip 1
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"
seta r_subdivisions "8"
seta r_lodbias "0"
seta r_dynamiclight "1"
seta r_flares "1"
seta r_fastsky "0"
seta cg_shadows "1"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "1"
seta r_ext_max_anisotropy "2"        // light aniso (2x) at high res
seta com_maxfps "0"
seta cg_drawfps "1"
seta cg_lagometer "0"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
seta watch_host "auto"
seta watch_port "27999"
