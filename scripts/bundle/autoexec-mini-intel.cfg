// mini-intel — Core 2 Duo 2.33 GHz / GMA 950 / Lion 10.7.5
// Strong CPU, weak fillrate-limited GPU (GMA 950, GL 1.4, no GLSL). Keep
// texture/effect fill modest; the CPU can carry geometry + physics.
seta r_mode "-1"
seta r_customwidth "1024"
seta r_customheight "768"
seta r_fullscreen "1"
seta r_picmip "1"
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"
seta r_subdivisions "4"
seta r_lodbias "0"
seta r_dynamiclight "0"               // GMA 950 fillrate
seta cg_shadows "1"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "0"
seta com_maxfps "0"
seta cg_drawfps "1"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
seta watch_host "auto"
seta watch_port "27999"
