// autoexec-ppc7400.cfg — per-ARCH baseline for ANY G4 (PPC 7400/7450, AltiVec).
// Applied to every G4 slice before the per-machine overlay. G4s have AltiVec
// (so the renderer + sound mixer use vectorized paths) and real GPUs, so this
// baseline is more generous than the G3's. The weakest G4 GPU in the fleet is
// the GeForce2 MX (sawtooth), so the fallback is tuned around that. Known G4s
// (sawtooth/quicksilver/mini-g4) overlay their GPU-specific values on top.
seta r_mode "-1"
seta r_customwidth "1024"
seta r_customheight "768"
seta r_fullscreen "1"
seta r_picmip "1"
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"               // lightmaps (AltiVec-friendly, real GPU)
seta r_subdivisions "8"
seta r_lodbias "1"
seta r_dynamiclight "1"
seta r_flares "0"
seta r_fastsky "0"
seta cg_shadows "1"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "0"
seta com_maxfps "0"
seta cg_drawfps "1"
// 3D HUD icons render fine on GeForce2/Radeon — leave them on (cg_draw3dIcons).
// Sound mixing is AltiVec-vectorized on the G4, so keep full-rate 22050 audio.
