// autoexec-ppc750.cfg — per-ARCH baseline for ANY G3 (PPC 750, no AltiVec).
// Applied by the in-engine auto-config (Com_AutoConfigForMachine) to every G3
// slice, BEFORE the per-machine overlay. This is the safe fallback for a G3 we
// don't have a specific profile for; known G3s (e.g. yosemite) then overlay
// their tuned values on top. Conservative on purpose — a 750 with a Rage-128-
// class GPU is the 1999 minimum spec. See docs/KNOBS.md, docs/PROFILING.md.
seta r_mode "-1"
seta r_customwidth "640"
seta r_customheight "480"
seta r_fullscreen "1"
seta r_picmip "2"
seta r_texturebits "16"
seta r_colorbits "16"
seta r_depthbits "16"
seta r_vertexlight "1"               // vertex lighting; skip lightmaps
seta r_subdivisions "20"
seta r_lodbias "2"
seta r_dynamiclight "0"
seta r_flares "0"
seta r_fastsky "1"
seta cg_shadows "0"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "0"
seta com_maxfps "0"
seta cg_drawfps "1"
// Rage-128-class HUD: 3D status-bar models render as garbage; use 2D icons.
seta cg_draw3dIcons "0"
seta cg_lagometer "0"
// Sound mixing is the biggest CPU cost on a 750 (scalar). 11025 Hz halves it.
seta s_sdlSpeed "11025"
