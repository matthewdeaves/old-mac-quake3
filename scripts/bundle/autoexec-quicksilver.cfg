// quicksilver — Quicksilver G4 733 MHz / Radeon 9000 Pro 64 MB / Tiger 10.4.11
// Native panel 1680x1050 (16:10). Driving the NATIVE resolution is what makes
// the game truly fullscreen + full-width AND a safe same-mode set (non-native
// mode switches black-screened the Radeon). Per user pref effects come first,
// and target is >=45 fps while keeping the best-looking config (2026-07-05).
// Radeon 9000 = S3TC + aniso + 6 TMUs, so real renderer on: lightmaps,
// multi-stage shaders, dlights, flares. Bench-CONFIRMED native 1680x1050:
// shipped effects 38.9 fps; +s_sdlSpeed 11025 -> 41.1 fps (see below). At native
// res the G4 is CPU/geometry-bound with fill to spare (2.24x the pixels of
// 1024x768 cost only ~12% fps), so fps wins come from CPU levers, not fill.
// Overlays ppc7400.
seta r_mode "-1"
seta r_customwidth "1680"            // NATIVE — true fullscreen + full width
seta r_customheight "1050"
seta r_fullscreen "1"
seta r_picmip "1"                    // 1 (not 0) to hold ~35 fps at 1.76M pixels
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"               // lightmaps + full multi-stage shaders
seta r_subdivisions "8"
seta r_lodbias "0"
seta r_dynamiclight "1"
seta r_flares "1"
seta r_fastsky "0"                   // real skybox — the Radeon can afford it
seta cg_shadows "1"
seta r_ext_compressed_textures "1"   // Radeon HAS S3TC (unlike the Rage 128)
seta r_ext_texture_filter_anisotropic "0"  // aniso too costly at 1680x1050
seta com_maxfps "0"
seta cg_drawfps "1"
seta cg_lagometer "0"
// Sound mix rate: the G4 sound mixer IS AltiVec-vectorized (S_PaintChannelFrom16_
// altivec, com_altivec 1), so unlike the scalar G3 the ppc7400 baseline keeps
// full-rate 22050. But the 8-bot 'four' demo still spends real CPU here, and at
// native res quicksilver is CPU-bound — so halving the rate buys fps with ZERO
// visual cost (audio only). Bench-CONFIRMED: 38.9 -> 41.1 fps (+2.2, +5.7%),
// worst-frame 84->81 ms. A free step toward the >=45 target; stacks with the
// code-level CPU wins (VBO/AltiVec) still to come. Overrides the ppc7400 22050.
seta s_sdlSpeed "11025"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
seta watch_host "auto"
seta watch_port "27999"
