// sawtooth — G4 500 MHz / GeForce2 MX 32 MB / Tiger 10.4.11
// Slowest of the G4 trio. Moderate quality; the GeForce2 MX is fillrate-modest.
seta r_mode "-1"
seta r_customwidth "1024"
seta r_customheight "768"
seta r_fullscreen "1"
seta r_picmip "1"
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"               // lightmaps
seta r_subdivisions "8"
seta r_lodbias "1"
seta r_dynamiclight "1"
seta r_fastsky "0"
seta cg_shadows "1"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "0"
seta com_maxfps "0"
seta cg_drawfps "1"
