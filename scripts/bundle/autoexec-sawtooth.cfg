// sawtooth — Sawtooth G4 500 MHz / GeForce2 MX 32 MB / Tiger 10.4.11
// Weakest G4: slowest CPU + the only fixed-function (GeForce2) GPU. Native
// display IS 1024x768 @ 60 Hz (4:3) — lighter than the other G4s' 1680x1050,
// so effects fit at native res (true fullscreen + safe same-mode set). Target
// ~30 fps with effects (per user pref). Overlays the ppc7400 baseline.
// NOTE: never bench-validated (sawtooth was offline / never ran Q3). Confirm fps
// on site; if it dips below ~30, drop r_dynamiclight 0 then r_picmip up.
seta r_mode "-1"
seta r_customwidth "1024"            // native panel — true fullscreen/full-width
seta r_customheight "768"
seta r_fullscreen "1"
seta r_picmip "1"                    // 32 MB VRAM + GeForce2 — keep picmip 1
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"               // lightmaps + full multi-stage shaders
seta r_subdivisions "8"
seta r_lodbias "1"
seta r_dynamiclight "1"
seta r_flares "1"
seta r_fastsky "0"
seta cg_shadows "1"
seta r_ext_compressed_textures "1"   // GeForce2 has S3TC
seta r_ext_texture_filter_anisotropic "0"  // GeForce2 MX: no useful aniso
seta com_maxfps "0"
seta cg_drawfps "1"
seta cg_lagometer "0"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
seta watch_host "auto"
seta watch_port "27999"
