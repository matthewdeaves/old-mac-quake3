// autoexec-x86_64.cfg — per-ARCH baseline for ANY Intel Mac (x86_64).
// Applied to the x86_64 slice before the per-machine overlay. Covers everything
// from a Core 2 Duo / GMA 950 (mini-intel, Lion) up to modern iMacs. Kept
// moderate so the floor case (the GMA 950) stays smooth; fast machines
// (imac-2019) overlay higher quality. Dynamic lights off by default because the
// GMA 950 is fill-bound; known fast machines turn them back on.
seta r_mode "-1"
seta r_customwidth "1024"
seta r_customheight "768"
seta r_fullscreen "1"
seta r_picmip "1"
seta r_texturebits "32"
seta r_colorbits "32"
seta r_depthbits "24"
seta r_vertexlight "0"
seta r_subdivisions "4"
seta r_lodbias "0"
seta r_dynamiclight "0"               // GMA 950 fill-rate floor; fast iMacs re-enable
seta r_flares "1"
seta r_fastsky "0"
seta cg_shadows "1"
seta r_ext_compressed_textures "1"
seta r_ext_texture_filter_anisotropic "0"
seta com_maxfps "0"
seta cg_drawfps "1"
seta cg_lagometer "0"                // the net-graph box is ugly clutter; hide it
// Native game modules: load the x86_64 cgame/qagame/ui dylibs bundled in the .app
// instead of JIT-compiling the pak8 QVM. Real-compiler-over-JIT + dropped-sandbox-
// masking win, free and consistent; falls back to the QVM if a dylib is absent or
// on a pure server. See docs/PROFILING.md.
seta vm_cgame "0"
seta vm_game "0"
seta vm_ui "0"
