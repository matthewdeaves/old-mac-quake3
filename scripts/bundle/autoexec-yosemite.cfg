// yosemite — G3 449 MHz / Rage 128 16 MB / Panther 10.3.9
// Survival tuning. The Rage 128 has 16 MB VRAM and no modern GL, and Q3 on a
// 449 MHz G3 is at the 1999 minimum spec. Everything here is dialled for
// "playable", not "pretty". PROVE >=20 fps by bench before adding quality back;
// if it can't clear the floor, this slice may get gated out (see ../MISTAKES.md).
seta r_mode "-1"
seta r_customwidth "640"
seta r_customheight "480"
seta r_fullscreen "1"
seta r_picmip "3"                    // blurriest textures, least fill + VRAM
seta r_texturebits "16"
seta r_colorbits "16"
seta r_depthbits "16"
seta r_vertexlight "1"               // vertex lighting; skip lightmaps
seta r_subdivisions "20"             // coarse curve tessellation
seta r_lodbias "2"                   // aggressive model LOD
seta r_dynamiclight "0"
seta r_flares "0"
seta r_fastsky "1"
seta cg_shadows "0"
seta r_ext_compressed_textures "1"   // critical on 16 MB VRAM
seta r_ext_texture_filter_anisotropic "0"
seta com_maxfps "0"
seta cg_drawfps "1"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
seta watch_host "auto"
seta watch_port "27999"
