// yosemite — G3 449 MHz / Rage 128 16 MB / Panther 10.3.9
// Tuned from bench evidence (2026-06-29). Goal: the PRETTIEST G3 build that
// still clears the >=20 fps floor. The user wants the map's real shader work
// back — lit/animated wall surfaces, portals, flares — which the old "survival"
// config (r_vertexlight 1) had collapsed away. So we drop to 800x600 to buy the
// fill budget for full shaders + lightmaps. See docs/KNOBS.md + PROFILING.md.
//
// Bench (demo four, 800x600, effects ON): picmip 1 = 22.1 fps (ships), picmip 0
// = 19.5 (just under floor + VRAM thrash). At 1024x768 effects-on is only 15.9.
// Texture A/B @1024 (effects off): picmip 3=28.2, 1=27.0, 0=20.8 (0 thrashes the
// 16 MB VRAM — no S3TC on the Rage 128). Sound: s_sdlSpeed 11025 (below).
seta r_mode "-1"
seta r_customwidth "800"             // 800x600 buys the fill budget for the
seta r_customheight "600"            // real shader/lightmap effects (vs 1024).
seta r_fullscreen "1"
seta r_picmip "1"                    // half-res textures; picmip 0 thrashes VRAM
seta r_texturebits "16"              // keep 16-bit: 16 MB VRAM is the real limit
seta r_colorbits "16"
seta r_depthbits "16"
seta r_vertexlight "0"               // LIGHTMAPS + full multi-stage shaders:
                                     // restores lit/animated walls, portals, etc
                                     // (r_vertexlight 1 collapsed them to 1 flat
                                     // stage — that was the "basic" look).
seta r_subdivisions "12"             // a bit smoother curves now we have lightmaps
seta r_lodbias "2"                   // aggressive model LOD (keep — fps is tight)
seta r_dynamiclight "1"              // dynamic lights (rocket/plasma glow) back on
seta r_flares "1"                    // light flares back on
seta r_fastsky "1"                   // keep cheap sky — skybox fill is too costly
seta cg_shadows "0"
seta r_ext_compressed_textures "1"   // critical on 16 MB VRAM
seta r_ext_texture_filter_anisotropic "0"
seta com_maxfps "0"
seta cg_drawfps "1"
// --- HUD correctness on the Rage 128 (2026-06-29) ----------------------------
// The Q3 status bar draws three actual 3D MD3 models into tiny HUD viewports
// (ammo, player head, spinning armor — cg_draw.c CG_DrawStatusBar). On the
// Rage 128's ancient GL these render as garbage smudges. cg_draw3dIcons 0 makes
// the HUD use the engine's flat 2D-icon fallback (CG_DrawPic) instead — correct
// AND cheaper (no model render). cg_lagometer 0 removes the corrupted net-graph
// block in the bottom-right corner. Together they FIXED the HUD and raised fps.
seta cg_draw3dIcons "0"
seta cg_lagometer "0"
// --- Sound mix cost (2026-06-29) -------------------------------------------
// Profiling (docs/PROFILING.md) showed sound mixing was ~29% of the G3 frame
// time — the single biggest CPU cost, scalar (no AltiVec on a 750). The SDL
// backend's rate is s_sdlSpeed (NOT s_khz); 11025 Hz halves the mix work.
// Measured (demo four, 640x480, via .app): 22050 -> 47.7 fps, 11025 -> 54.6 fps,
// sound off -> 61.0 fps. Must be set before sound init — the bundle auto-config
// execs this before CL_Init, so it takes effect for the launch.
seta s_sdlSpeed "11025"
// --- watchlink: Apple Watch "tactical computer" companion -----------------
// Auto-discover the iPhone/Watch companion over Bonjour and stream live vitals
// (health / armor / ammo / weapon / score / powerups) by UDP. Fully inert if
// no companion is found. Shared port + service with the Quake 1 / Quake 2 ports.
seta watch_host "auto"
seta watch_port "27999"
